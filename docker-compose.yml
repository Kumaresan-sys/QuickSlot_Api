version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: venue_booking
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Initialize DB schema and seed data on first boot
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  api:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      # Overrides the DB_HOST in .env to use the docker compose network hostname
      - DB_HOST=db
    depends_on:
      - db
    volumes:
      # Mount current directory for hot reloading if using dev script
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
